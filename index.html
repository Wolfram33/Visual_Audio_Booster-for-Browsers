<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Audio Fluid Visualizer</title>
    <!--
    ╔═══════════════════════════════════════════════════════════════════════════╗
    ║                        AUDIO FLUID VISUALIZER                              ║
    ║                                                                            ║
    ║  Ein kombinierter Audio-Visualizer mit WebGL Fluid Simulation,             ║
    ║  Waveform-Kreis und Average Circle Overlay.                                ║
    ║                                                                            ║
    ╠═══════════════════════════════════════════════════════════════════════════╣
    ║  CREDITS & ATTRIBUTION:                                                    ║
    ║                                                                            ║
    ║  • WebGL Fluid Simulation:                                                 ║
    ║    Basiert auf dem Werk von Pavel Dobryakov                                ║
    ║    https://github.com/PavelDoGreat/WebGL-Fluid-Simulation                  ║
    ║    MIT License                                                             ║
    ║                                                                            ║
    ║  • Waveform Circle & Average Circle Overlay:                               ║
    ║    Basiert auf "Audio Visualization III" von Noel Delgado (@pixelia_me)    ║
    ║    https://codepen.io/noeldelgado/pen/EaNjBy                               ║
    ║    https://pixelia.me                                                      ║
    ║                                                                            ║
    ║  • Kombination, Audio-Reactive Anpassungen & Beat-Detection:               ║
    ║    Rob de Roy – www.robderoy.de                                            ║
    ║                                                                            ║
    ╠═══════════════════════════════════════════════════════════════════════════╣
    ║  LICENSE: MIT                                                              ║
    ╚═══════════════════════════════════════════════════════════════════════════╝
    -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; }
        
        #fluidCanvas { 
            position: fixed;
            top: 0; left: 0;
            width: 100vw; 
            height: 100vh; 
            display: block;
            z-index: 1;
            background: transparent !important;
        }
        
        #overlayCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 2;
            pointer-events: none;
        }

        /* Spektrum-Balken am unteren Rand; Größe wird per JS gesetzt (kein CSS-Scaling) */
        #spectrumCanvas {
            position: fixed;
            left: 0; bottom: 100px;   /* Fallback; JS setzt die genaue Höhe über den Bedienelementen */
            display: block;
            z-index: 3;
            pointer-events: none;
        }
        
        .hidden { display: none; }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;          /* Regel 7: bricht auf kleinen Screens um */
            justify-content: center;
            gap: 10px;
            max-width: 95vw;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 12px;
        }
        /* Gemeinsame Button-Geometrie – Farbe kommt aus den Funktions-Klassen */
        .controls button,
        .palette-actions button,
        .bg-panel button {
            color: #fff;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            padding: 10px 16px;
            min-height: 40px;         /* Regel 7: touch-freundlich */
            transition: background-color 0.15s ease, transform 0.05s ease;
        }
        .controls button:active,
        .palette-actions button:active,
        .bg-panel button:active { transform: translateY(1px); }

        /* Funktions-Farben (Regel 5/6): Grün = Laden, Blau = Navigation/Bestätigen,
           Orange = Stopp/Entfernen, Braun = Werkzeuge/Auswahl. Kein Rosa/Pink/Lila. */
        .btn-load  { background: #2e9e5b; border-color: #41c277; }
        .btn-load:hover  { background: #39bd6d; }
        .btn-nav   { background: #2f72b8; border-color: #4791db; }
        .btn-nav:hover   { background: #3d8ad6; }
        .btn-stop  { background: #db8133; border-color: #f0a04a; }
        .btn-stop:hover  { background: #ee9740; }
        .btn-tool  { background: #8a6a47; border-color: #ac8657; }
        .btn-tool:hover  { background: #a07c52; }
        /* Aktiver/ausgewählter Zustand klar sichtbar (Regel 5) */
        .btn-tool.active { background: #a07c52; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.55); }
        
        .track-info {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        /* Native Player verstecken, wir nutzen nur die Custom-Controls */
        #audioPlayer {
            display: none;
        }

        /* Farb-Panel */
        .palette-panel {
            position: fixed;
            right: 20px;
            top: 20px;
            width: 320px;
            max-height: 70vh;
            overflow: auto;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            z-index: 200;
            display: none;
        }
        .palette-panel h3 { font-size: 16px; margin: 6px 0 10px; }
        .palette-panel .section { margin-bottom: 12px; }
        .palette-panel .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 6px 0; }
        .palette-panel label { font-size: 12px; opacity: 0.9; }
        .palette-panel input[type="color"] { width: 36px; height: 24px; border: none; background: transparent; padding: 0; }
        .palette-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

        /* Background Bild Container - LIEGT ÜBER DEM FLUID */
        #backgroundContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;  /* Über fluidCanvas (1) und overlayCanvas (2) */
            pointer-events: none;  /* Klicks durchlassen */
            background-color: transparent;  /* Kein schwarzer Hintergrund */
            background-repeat: no-repeat;
            background-position: center center;
            opacity: 0.1;  /* 90% transparent - Fluid scheint stark durch */
        }
        #backgroundContainer.stretch {
            background-size: 100% 100%;
        }
        #backgroundContainer.cover {
            background-size: cover;
        }
        #backgroundContainer.contain {
            background-size: contain;
        }
        #backgroundContainer.center {
            background-size: auto;
        }

        /* Background Panel */
        .bg-panel {
            position: fixed;
            left: 20px;
            top: 20px;
            width: 280px;
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            z-index: 200;
            display: none;
        }
        .bg-panel h3 { font-size: 16px; margin: 6px 0 10px; }
        .bg-panel .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 8px 0; }
        .bg-panel label { font-size: 12px; opacity: 0.9; }
        .bg-panel select, .bg-panel input[type="range"] { flex: 1; }
        .bg-panel select {
            background: #6f583c;   /* Auswahl-Feld hebt sich ab (Regel 5) */
            border: 1px solid #ac8657;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px;
        }
        .bg-panel select option {
            background: #333;
            color: #fff;
        }
        .bg-panel .preview { width: 100%; height: 60px; background: rgba(255,255,255,0.1); border-radius: 6px; margin: 8px 0; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .bg-panel .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .bg-panel button { flex: 1; }
    </style>
</head>
<body>
    <div id="backgroundContainer"></div>
    <canvas id="fluidCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
    <canvas id="spectrumCanvas"></canvas>
    
    <div class="track-info" id="trackInfo">📁 Audio oder Playlist laden zum Starten</div>
    <audio id="audioPlayer"></audio>
    
    <div class="controls">
        <button id="loadBtn" class="btn-load">📁 Audio/Playlist laden</button>
        <button id="prevBtn" class="btn-nav" title="Vorheriger Titel">⏮️</button>
        <button id="playBtn" class="btn-nav">▶️ Play</button>
        <button id="stopBtn" class="btn-stop" title="Stopp">⏹️ Stopp</button>
        <button id="nextBtn" class="btn-nav" title="Nächster Titel">⏭️</button>
        <button id="spectrumBtn" class="btn-tool" title="Spektrum-Balken ein/aus">📊 Balken</button>
        <button id="paletteBtn" class="btn-tool">🎨 Farben</button>
        <button id="bgBtn" class="btn-tool">🖼️ Hintergrund</button>
        <input type="file" id="audioFiles" class="hidden" accept="audio/*,.m3u,.m3u8,.pls,.asx,.xspf" multiple>
    </div>

    <div id="palettePanel" class="palette-panel">
        <h3>🎨 Farben anpassen</h3>
        <div class="section">
            <strong>Overlay – Waveform</strong>
            <div class="row"><label for="waveStroke">Stroke normal</label><input type="color" id="waveStroke"></div>
            <div class="row"><label for="waveStrokePeak">Stroke Peak</label><input type="color" id="waveStrokePeak"></div>
            <div class="row"><label for="waveFill">Fill normal</label><input type="color" id="waveFill"></div>
            <div class="row"><label for="waveFillPeak">Fill Peak</label><input type="color" id="waveFillPeak"></div>
        </div>
        <div class="section">
            <strong>Overlay – Bubble</strong>
            <div class="row"><label for="circleAmplitude">Waveform-Amplitude</label><input type="range" id="circleAmplitude" min="0" max="15" step="0.25" value="3.75"></div>
            <div class="row"><label for="bubbleLine">Line normal</label><input type="color" id="bubbleLine"></div>
            <div class="row"><label for="bubbleLineAlpha">Alpha Line</label><input type="range" id="bubbleLineAlpha" min="0" max="1" step="0.01"></div>
            <div class="row"><label for="bubbleLinePeak">Line Peak</label><input type="color" id="bubbleLinePeak"></div>
            <div class="row"><label for="bubbleLinePeakAlpha">Alpha Line Peak</label><input type="range" id="bubbleLinePeakAlpha" min="0" max="1" step="0.01"></div>
            <div class="row"><label for="bubbleFill">Fill normal</label><input type="color" id="bubbleFill"></div>
            <div class="row"><label for="bubbleFillAlpha">Alpha Fill</label><input type="range" id="bubbleFillAlpha" min="0" max="1" step="0.01"></div>
            <div class="row"><label for="bubbleFillPeak">Fill Peak</label><input type="color" id="bubbleFillPeak"></div>
            <div class="row"><label for="bubbleFillPeakAlpha">Alpha Fill Peak</label><input type="range" id="bubbleFillPeakAlpha" min="0" max="1" step="0.01"></div>
        </div>
        <div class="section">
            <strong>Fluid – Bänder</strong>
            <div class="row"><label for="subColor">Sub</label><input type="color" id="subColor"></div>
            <div class="row"><label for="kickColor">Kick</label><input type="color" id="kickColor"></div>
            <div class="row"><label for="bassAColor">Bass A</label><input type="color" id="bassAColor"></div>
            <div class="row"><label for="bassBColor">Bass B</label><input type="color" id="bassBColor"></div>
            <div class="row"><label for="midColor">Mid</label><input type="color" id="midColor"></div>
            <div class="row"><label for="trebleAColor">Treble A</label><input type="color" id="trebleAColor"></div>
            <div class="row"><label for="trebleBColor">Treble B</label><input type="color" id="trebleBColor"></div>
        </div>
        <div class="palette-actions">
            <button id="paletteResetBtn" class="btn-tool">Zurücksetzen</button>
            <button id="paletteCloseBtn" class="btn-nav">Schließen</button>
        </div>
    </div>

    <div id="bgPanel" class="bg-panel">
        <h3>🖼️ Hintergrundbild</h3>
        <div class="preview" id="bgPreview"></div>
        <div class="row">
            <label for="bgMode">Darstellung</label>
            <select id="bgMode">
                <option value="cover">Füllen (Cover)</option>
                <option value="stretch">Strecken</option>
                <option value="contain">Einpassen</option>
                <option value="center">Zentriert (Original)</option>
            </select>
        </div>
        <div class="btn-row">
            <button id="bgSelectBtn" class="btn-load">📁 Bild wählen</button>
            <button id="bgClearBtn" class="btn-stop">🗑️ Entfernen</button>
        </div>
        <input type="file" id="bgImageFile" class="hidden" accept="image/*">
        <div class="btn-row">
            <button id="bgCloseBtn" class="btn-nav">Schließen</button>
        </div>
    </div>

<script src="index.js"></script>
</body>
</html>
